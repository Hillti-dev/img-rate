<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bildbewertung</title>
    <link rel="stylesheet" href="style.css">
    <meta name="owner" content="Hillti">
    <meta name="developer" content="Hillti">
    <meta name="author" content="Hillti">
    <meta name="description" content="Bildbewertung"> 
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes"> 
</head>
<body>

<div class="app-shell">
    <header class="topbar">
        <button id="settingsBtn" class="icon-btn" aria-label="Einstellungen">⚙</button>
        <div class="title-wrap">
            <p class="eyebrow">Bildbewertung</p>
            <h1>Bewertung</h1>
        </div>
    </header>

    <main>
        <section class="image-frame">
            <img id="image" src="" alt="Zufälliges Bild aus der Galerie">
            <div class="image-caption" id="imageCaption">Lade Bild…</div>
        </section>

        <div class="rating-panel">
            <div id="stars" class="stars">
                <span data-rating="1">★</span>
                <span data-rating="2">★</span>
                <span data-rating="3">★</span>
                <span data-rating="4">★</span>
                <span data-rating="5">★</span>
            </div>
            <div class="rating-info" id="ratingInfo">Keine Bewertung</div>
        </div>

        <div class="controls">
            <button id="prevBtn" class="control-btn">Zurück</button>
            <button id="nextBtn" class="control-btn">Nächstes Bild</button>
        </div>
    </main>
</div>

<div id="settingsOverlay" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="settings-panel">
        <div class="settings-header">
            <div>
                <p class="eyebrow">Einstellungen</p>
                <h2 id="settingsTitle">Design</h2>
            </div>
            <button id="closeSettings" class="icon-btn" aria-label="Schließen">✕</button>
        </div>

        <div class="setting-row toggle-row">
            <span class="theme-label">Darkmode</span>
            <label class="switch">
                <input id="themeToggle" type="checkbox" checked>
                <span class="slider"></span>
            </label>
            <span class="theme-label">Lightmode</span>
        </div>
    </div>
</div>

<script src="app.js"></script>

</body>
</html>
